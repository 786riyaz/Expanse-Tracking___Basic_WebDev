<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">💰 Expense Tracker</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-3 mb-2">
                    <h5>Total Expense</h5>
                    <h3 id="totalExpense">₹0</h3>
                    <h5>Total Records</h5>
                    <h3 id="totalRecords">0</h3>
                </div>
                <div class="card shadow-sm p-3 mb-2">
                    <form onsubmit="addExpense(event)">
                        <input type="hidden" id="recordId">
                        <div class="mb-3">
                            <label class="form-label">Amount</label>
                            <input id="amount" class="form-control" type="number" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input id="desc" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select id="category" class="form-select">
                                <option>Fuel</option>
                                <option>Food</option>
                                <option>Utility</option>
                                <option>Medical</option>
                                <option>Study</option>
                                <option>Travel</option>
                            </select>
                        </div>
                        <button id="submitButton" class="btn btn-primary w-100">Add Expense</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table mb-0" id="table">
                            <thead>
                                <tr>
                                    <th>Amount</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
